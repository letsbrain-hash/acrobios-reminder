name: Invoice Check

on:
  schedule:
    - cron: '0 2 5 * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Write Google service account credentials file
        env:
          GOOGLE_CREDENTIALS_BASE64: ${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}
        run: echo "$GOOGLE_CREDENTIALS_BASE64" | base64 -d > credentials.json
      - name: Run invoice check
        env:
          OAUTH_TOKEN_ACROBIOS0503_JSON: ${{ secrets.OAUTH_TOKEN_ACROBIOS0503_JSON }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_NOTIFY_USER_ID: ${{ secrets.LINE_NOTIFY_USER_ID }}
        run: python invoice_check.py
